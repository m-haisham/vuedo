# Production deployment for vuedo.
# Brings up the orchestrator (built from deploy/Dockerfile) plus the
# headless-Chromium services it coordinates with.
#
#   docker compose -f deploy/docker-compose.yml up
#
services:
  pdf-orchestrator:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - GOTENBERG_URL=http://gotenberg:3000
    depends_on: [gotenberg, browserless, redis]

  gotenberg:
    image: gotenberg/gotenberg:8
    ports: ["3000:3000"]

  browserless:
    image: browserless/chrome:latest
    ports: ["3001:3000"]

  redis:
    image: redis:alpine
    ports: ["6379:6379"]
